[php]
extensions = ["pdo_mysql", "gd", "zip"]
version = "8.1"

[phases.setup]
nixPkgs = ["php81", "php81Extensions.pdo_mysql", "php81Extensions.gd", "php81Extensions.zip", "nginx"]

[phases.install]
cmds = [
  # Создание всех необходимых директорий
  "mkdir -p /etc/php-fpm.d",
  "mkdir -p /var/log/nginx",
  "mkdir -p /var/lib/nginx",
  "mkdir -p /etc/nginx",
  "mkdir -p /run/php-fpm",
  "mkdir -p /tmp/php-sessions",
  "mkdir -p /var/www/html",

  # Конфигурация PHP-FPM
  "echo '[global]' > /etc/php-fpm.conf",
  "echo 'pid = /run/php-fpm/php-fpm.pid' >> /etc/php-fpm.conf",
  "echo 'error_log = /var/log/php-fpm.log' >> /etc/php-fpm.conf",
  "echo 'log_level = notice' >> /etc/php-fpm.conf",
  "echo 'include=/etc/php-fpm.d/*.conf' >> /etc/php-fpm.conf",

  # Пул www
  "echo '[www]' > /etc/php-fpm.d/www.conf",
  "echo 'user = www-data' >> /etc/php-fpm.d/www.conf",
  "echo 'group = www-data' >> /etc/php-fpm.d/www.conf",
  "echo 'listen = 127.0.0.1:9000' >> /etc/php-fpm.d/www.conf",
  "echo 'listen.backlog = 65535' >> /etc/php-fpm.d/www.conf",
  "echo 'listen.allowed_clients = 127.0.0.1' >> /etc/php-fpm.d/www.conf",
  "echo 'pm = dynamic' >> /etc/php-fpm.d/www.conf",
  "echo 'pm.max_children = 50' >> /etc/php-fpm.d/www.conf",
  "echo 'pm.start_servers = 5' >> /etc/php-fpm.d/www.conf",
  "echo 'pm.min_spare_servers = 5' >> /etc/php-fpm.d/www.conf",
  "echo 'pm.max_spare_servers = 10' >> /etc/php-fpm.d/www.conf",
  "echo 'pm.max_requests = 500' >> /etc/php-fpm.d/www.conf",
  "echo 'chdir = /' >> /etc/php-fpm.d/www.conf",
  "echo 'catch_workers_output = yes' >> /etc/php-fpm.d/www.conf",
  "echo 'php_flag[display_errors] = off' >> /etc/php-fpm.d/www.conf",
  "echo 'php_admin_value[error_log] = /var/log/php-fpm-www.log' >> /etc/php-fpm.d/www.conf",
  "echo 'php_admin_flag[log_errors] = on' >> /etc/php-fpm.d/www.conf",

  # Создание fastcgi_params
  "echo 'fastcgi_param  QUERY_STRING       $query_string;' > /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  REQUEST_METHOD     $request_method;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  CONTENT_TYPE       $content_type;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  CONTENT_LENGTH     $content_length;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  SCRIPT_NAME        $fastcgi_script_name;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  REQUEST_URI        $request_uri;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  DOCUMENT_URI       $document_uri;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  DOCUMENT_ROOT      $document_root;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  SERVER_PROTOCOL    $server_protocol;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  REQUEST_SCHEME     $scheme;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  HTTPS              $https if_not_empty;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  GATEWAY_INTERFACE  CGI/1.1;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  SERVER_SOFTWARE    nginx/$nginx_version;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  REMOTE_ADDR        $remote_addr;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  REMOTE_PORT        $remote_port;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  SERVER_ADDR        $server_addr;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  SERVER_PORT        $server_port;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  SERVER_NAME        $server_name;' >> /etc/nginx/fastcgi_params",
  "echo 'fastcgi_param  REDIRECT_STATUS    200;' >> /etc/nginx/fastcgi_params",

  # Права доступа
  "chown -R www-data:www-data /run/php-fpm || true",
  "chown -R www-data:www-data /var/log/nginx || true",
  "chmod -R 755 /run/php-fpm || true"
]
