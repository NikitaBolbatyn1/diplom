  "echo '    image/x-pict                                           pic;' >> /etc/nginx/mime.types",
  "echo '    image/x-portable-anymap                                pnm;' >> /etc/nginx/mime.types",
  "echo '    image/x-portable-bitmap                                pbm;' >> /etc/nginx/mime.types",
  "echo '    image/x-portable-graymap                               pgm;' >> /etc/nginx/mime.types",
  "echo '    image/x-portable-pixmap                                ppm;' >> /etc/nginx/mime.types",
  "echo '    image/x-psd                                            psd;' >> /etc/nginx/mime.types",
  "echo '    image/x-rgb                                            rgb;' >> /etc/nginx/mime.types",
  "echo '    image/x-tga                                            tga;' >> /etc/nginx/mime.types",
  "echo '    image/x-xbitmap                                        xbm;' >> /etc/nginx/mime.types",
  "echo '    image/x-xpixmap                                        xpm;' >> /etc/nginx/mime.types",
  "echo '    image/x-xwindowdump                                    xwd;' >> /etc/nginx/mime.types",
  "echo '}' >> /etc/nginx/mime.types"

  # Права доступа
  "chown -R www-data:www-data /run/php-fpm || true",
  "chown -R www-data:www-data /var/log/nginx || true",
  "chmod -R 755 /run/php-fpm || true"
]
