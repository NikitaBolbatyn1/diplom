[php]
extensions = ["pdo_mysql", "gd", "zip"]
version = "8.4"

[phases.setup]
nixPkgs = ["php", "phpExtensions.pdo_mysql", "phpExtensions.gd", "phpExtensions.zip", "nginx"]

[phases.install]
cmds = [
  # Создание всех необходимых директорий
  "mkdir -p /etc/php-fpm.d /var/log/nginx /var/lib/nginx /etc/nginx /run/php-fpm /tmp/php-sessions /var/www/html",

  # Копирование конфигов из репозитория
  "cp /app/php-fpm.conf /etc/php-fpm.conf",
  "cp /app/www.conf /etc/php-fpm.d/www.conf",
  "cp /app/fastcgi_params /etc/nginx/fastcgi_params",
  "cp /app/mime.types /etc/nginx/mime.types",

  # Права доступа
  "chown -R www-data:www-data /run/php-fpm /var/log/nginx || true",
  "chmod -R 755 /run/php-fpm || true",
  "mkdir -p /app/var/cache/dev /app/var/log",
  "chown -R nobody:nobody /app/var || true",
  "chmod -R 775 /app/var || true",

  "mkdir -p /app/public/uploads/archive /app/var/archive",

  "mkdir -p /tmp/php-sessions",

  "mkdir -p /app/var/cache/prod /app/var/log /app/var/sessions",

  "rm -rf /app/var/cache/*",
  "chmod +x /app/start.sh",
  "chmod 755 /app/start.sh",
  "chmod +x /app/start.sh",
  "ls -la /app/start.sh"
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "php bin/console cache:clear --env=prod --no-debug --no-warmup",
  "chmod +x /app/start.sh",
  "cp /app/php-fpm.conf /etc/php-fpm.conf",
  "cp /app/www.conf /etc/php-fpm.d/www.conf",

  "echo '=== PHP-FPM CONFIGS AFTER COPY ==='",
  "ls -la /etc/php-fpm.conf",
  "ls -la /etc/php-fpm.d/",
  "echo '=== END ==='",

  "php-fpm -t -y /etc/php-fpm.conf || echo 'PHP-FPM config test failed'",
]

[start]
cmd = "/app/start.sh"
